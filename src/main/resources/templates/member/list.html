<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<a href="/member/join">회원가입</a>
<a href="/member/login">로그인</a>
  <table>
    <tr>
      <td >아이디</td>
      <td>이름</td>
      <td>닉네임</td>
        <td>등급</td>
    </tr>
      <tr th:each="members : ${list}">
          <td th:text="${members.userId}">아이디</td>
          <td th:text="${members.name}">이름</td>
          <td th:text="${members.nickname}">닉네임</td>
          <td th:text="${members.grade}">등급</td>
      </tr>
  </table>
</body>
</html>
